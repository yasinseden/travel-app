<div class="canvas-container">

  <div class="toolbar border-round-lg flex gap-2 p-3 border-round shadow-2 absolute top-0 left-50 align-items-center"
    style="transform: translateX(-50%); z-index: 10000; margin-top: 10px; background: rgba(255, 255, 255, 0.95);">

    <button class="p-button p-component p-button-sm p-button-text p-button-plain mr-2" (click)="goBack()"
      title="Geri Dön">
      <span class="p-button-icon pi pi-arrow-left"></span>
    </button>

    <div class="flex flex-column mr-3">
      <span class="text-xs text-500 mb-1">Dergi Adı</span>
      <input type="text" [(ngModel)]="magazine.title" class="p-inputtext p-component p-inputtext-sm font-bold"
        style="width: 150px; border: none; background: transparent; padding: 0; outline: none; border-bottom: 1px solid #ccc; border-radius: 0;">
    </div>

    <div style="width: 1px; height: 30px; background-color: #ccc;" class="mr-2"></div>

    <div class="flex align-items-center mr-2" title="Arkaplan Rengi">
      <i class="pi pi-palette mr-2"></i>
      <input type="color" [(ngModel)]="pageBackgroundColor"
        style="border:none; width:30px; height:30px; cursor:pointer; padding:0; background:transparent;">
    </div>
    <button class="p-button p-component p-button-sm p-button-text p-button-secondary"
      (click)="setBackgroundImage($event)" title="Arkaplan Resmi Ekle">
      <span class="p-button-icon pi pi-image" style="font-size: 1.2rem;"></span>
    </button>
    <button *ngIf="pageBackgroundImage" class="p-button p-component p-button-sm p-button-text p-button-danger mr-2"
      (click)="removeBackgroundImage()" title="Arkaplan Resmini Kaldır">
      <span class="p-button-icon pi pi-trash" style="font-size: 1.2rem;"></span>
    </button>
    <div style="width: 1px; height: 30px; background-color: #ccc;" class="mr-2"></div>
    <button class="p-button p-component p-button-sm p-button-primary" (click)="addElement('text')">
      <span class="p-button-icon pi pi-language mr-2"></span>
      <span class="p-button-label">Text Ekle</span>
    </button>
    <button class="p-button p-component p-button-sm p-button-secondary" (click)="addElement('image', $event)">
      <span class="p-button-icon pi pi-image mr-2"></span>
      <span class="p-button-label">Resim Ekle</span>
    </button>
    <button class="p-button p-component p-button-sm p-button-success" (click)="addElement('video')">
      <span class="p-button-icon pi pi-video mr-2"></span>
      <span class="p-button-label">Video Ekle</span>
    </button>

    <div style="width: 1px; height: 30px; background-color: #ccc;" class="mr-2 ml-2"></div>
    <button class="p-button p-component p-button-sm p-button-warning" (click)="clearCurrentPage()"
      title="Sayfayı Temizle">
      <span class="p-button-icon pi pi-trash mr-2"></span>
      <span class="p-button-label">Temizle</span>
    </button>
    <button class="p-button p-component p-button-sm p-button-info" (click)="addNewPage()" title="Yeni Sayfa Oluştur">
      <span class="p-button-icon pi pi-plus mr-2"></span>
      <span class="p-button-label">Yeni Sayfa</span>
    </button>

    <div style="width: 1px; height: 30px; background-color: #ccc;" class="mr-2 ml-2"></div>

    <button class="p-button p-component p-button-sm p-button-help mr-2" (click)="previewMagazine()"
      title="Dergi Önizlemesi">
      <span class="p-button-icon pi pi-eye mr-2"></span>
      <span class="p-button-label">Önizleme</span>
    </button>
    <button class="p-button p-component p-button-sm p-button-success" (click)="saveMagazine()" title="Dergiyi Kaydet">
      <span class="p-button-icon pi pi-save mr-2"></span>
      <span class="p-button-label">Kaydet</span>
    </button>
  </div>

  <!-- Page List Sidebar -->
  <div class="pages-sidebar absolute left-0 top-0 p-3 flex flex-column gap-2"
    style="z-index: 10000; top: 80px !important;">
    <div *ngFor="let page of pages; let i = index"
      class="page-thumbnail p-2 border-round overflow-hidden cursor-pointer shadow-1 text-center"
      [style.background]="activePageId === page.id ? 'white' : 'var(--primary-color)'"
      [style.color]="activePageId === page.id ? 'var(--primary-color)' : 'white'" (click)="selectPage(page.id)">
      <span class="font-bold">Sayfa {{i + 1}}</span>
    </div>
  </div>

  <div class="canvas-board" [style.position]="'relative'" [style.width]="'100%'" [style.height]="'100vh'"
    [style.background-color]="pageBackgroundColor"
    [style.background-image]="pageBackgroundImage ? 'url(' + pageBackgroundImage + ')' : 'none'"
    [style.background-size]="'cover'" [style.background-repeat]="'no-repeat'"
    [style.background-position]="'center center'">
    <app-canvas-item *ngFor="let el of elements" [element]="el" [isSelected]="selectedElementId === el.id"
      [boardWidth]="boardWidth" [boardHeight]="boardHeight" (elementChange)="updateElement($event)"
      (selectItem)="selectElement(el.id)" (remove)="removeElement(el.id)"></app-canvas-item>
  </div>

  <!-- Image Selection Dialog Popover -->
  <div *ngIf="showImageDialog" class="p-3 border-round shadow-4 flex flex-column gap-3" [style.position]="'fixed'"
    [style.left.px]="imageDialogPosition.x" [style.top.px]="imageDialogPosition.y" [style.z-index]="10005"
    style="min-width: 300px; background: rgba(255, 255, 255, 0.788);">

    <div class="flex flex-column gap-2">
      <label class="font-bold text-700">Cihazdan Seç</label>
      <button class="p-button p-component p-button-secondary w-full flex justify-content-center"
        (click)="onDeviceUpload()">
        <span class="p-button-icon pi pi-upload mr-2"></span>
        <span class="p-button-label">Bilgisayardan Yükle</span>
      </button>
    </div>

    <div class="flex align-items-center justify-content-center">
      <div class="w-full border-top-1 border-300"></div>
      <span class="px-3 text-500 font-bold text-sm">VEYA</span>
      <div class="w-full border-top-1 border-300"></div>
    </div>

    <div class="flex flex-column gap-2">
      <label class="font-bold text-700">URL Gir</label>
      <div class="flex w-full">
        <input type="text" [(ngModel)]="imageUrlInput" placeholder="https://..." class="flex-1"
          style="padding: 0.5rem; border: 1px solid #ced4da; border-radius: 4px 0 0 4px; outline: none; font-family: inherit;" />
        <button type="button" class="p-button p-component p-button-primary" (click)="onUrlSubmit()"
          style="border-top-left-radius: 0; border-bottom-left-radius: 0;">Ekle</button>
      </div>
    </div>

    <div class="flex justify-content-end mt-2">
      <button class="p-button p-component p-button-text p-button-danger" (click)="closeImageDialog()"
        style="padding: 0.5rem;">İptal</button>
    </div>
  </div>
</div>
