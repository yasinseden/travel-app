<div class="viewer-container bg-gray-900 h-screen w-screen overflow-hidden relative flex flex-column align-items-center justify-content-center" *ngIf="magazine">
  
  <div class="absolute top-0 right-0 p-3 z-5">
    <button class="p-button p-component p-button-danger shadow-3" (click)="goBack()">
      <span class="p-button-icon pi pi-times mr-2"></span>
      <span class="p-button-label">Kapat</span>
    </button>
  </div>

  <div class="magazine-title absolute top-0 left-0 p-3 z-5 text-white">
    <h2 class="m-0 text-shadow-1">{{ magazine.title }}</h2>
  </div>

  <!-- The Page View -->
  <div class="page-container relative shadow-8 transition-all transition-duration-500 ease-in-out" 
       [style.width.px]="boardWidth" 
       [style.height.px]="boardHeight"
       style="overflow: hidden;">
    
    <ng-container *ngFor="let p of (activePage ? [activePage] : []); trackBy: trackById">
      <div class="page-content absolute top-0 left-0 w-full h-full page-flip-animation"
           [style.background-color]="p.backgroundColor"
           [style.background-image]="p.backgroundImage ? 'url(' + p.backgroundImage + ')' : 'none'"
           [style.background-size]="'cover'" 
           [style.background-repeat]="'no-repeat'"
           [style.background-position]="'center center'"
           style="pointer-events: none;">
        
        <app-canvas-item *ngFor="let el of p.elements" 
            [element]="el" [isSelected]="false"
            [boardWidth]="boardWidth" 
            [boardHeight]="boardHeight">
        </app-canvas-item>
        
      </div>
    </ng-container>
    
  </div>

  <!-- Navigation Controls -->
  <div class="navigation-controls absolute bottom-0 left-50 p-4 z-5 flex align-items-center gap-4" style="transform: translateX(-50%);">
    <button class="p-button p-component p-button-rounded p-button-lg p-button-secondary shadow-4" 
            (click)="prevPage()" [disabled]="currentPageIndex === 0">
      <span class="pi pi-chevron-left"></span>
    </button>
    <span class="text-white font-bold text-xl text-shadow-1">
      Sayfa {{ currentPageIndex + 1 }} / {{ magazine.pages.length }}
    </span>
    <button class="p-button p-component p-button-rounded p-button-lg p-button-secondary shadow-4" 
            (click)="nextPage()" [disabled]="currentPageIndex === magazine.pages.length - 1">
      <span class="pi pi-chevron-right"></span>
    </button>
  </div>

</div>

<div class="h-screen w-screen flex flex-column align-items-center justify-content-center bg-gray-900 text-white gap-3" *ngIf="!magazine">
  <i class="pi pi-exclamation-circle text-6xl text-red-400"></i>
  <h2>Dergi Bulunamadı</h2>
  <button class="p-button p-component" (click)="goBack()">Geri Dön</button>
</div>
