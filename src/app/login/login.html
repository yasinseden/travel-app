<div class="login-page">

  <!-- Left Side: Slideshow -->
  <section class="slideshow-container">
    <div *ngFor="let img of images; let i = index" class="slide" [style.backgroundImage]="'url(' + img + ')'"
      [class.active]="currentSlideIndex === i">
    </div>

    <div class="slide-content-bottom">
      <div class="quote-wrapper" *ngFor="let quote of quotes; let i = index" [class.active]="currentSlideIndex === i">
        <p>"{{ quote }}"</p>
      </div>
    </div>
  </section>

  <!-- Right Side: Login Form -->
  <section class="form-container">

    <div class="form-box">
      <header>
        <div class="branding">
          <img src="assets/logo-transparent-bg.png" alt="Viatio Logo" class="login-logo" width="100%">
        </div>
        <h3>{{ 'LOGIN.TITLE' | translate }}</h3>
        <p>{{ 'LOGIN.SUBTITLE' | translate }}</p>
      </header>

      <form (ngSubmit)="onLogin()">
        <div class="input-group">
          <label for="email">{{ 'LOGIN.EMAIL' | translate }}</label>
          <div class="input-wrapper">
            <input type="email" id="email" name="email" [placeholder]="'LOGIN.EMAIL_PLACEHOLDER' | translate"
              [(ngModel)]="loginData.email" required>
          </div>
        </div>

        <div class="input-group">
          <label for="password">{{ 'LOGIN.PASSWORD' | translate }}</label>
          <div class="input-wrapper">
            <input [type]="showPassword ? 'text' : 'password'" id="password" name="password" placeholder="••••••••"
              [(ngModel)]="loginData.password" required>
            <button type="button" class="toggle-password" (click)="togglePassword()">
              <i class="text-lg mr-1 pi pi-eye" *ngIf="!showPassword"></i>
              <i class="text-lg mr-1 pi pi-eye-slash" *ngIf="showPassword"></i>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" name="rememberMe" [(ngModel)]="loginData.rememberMe">
            {{ 'LOGIN.REMEMBER_ME' | translate }}
          </label>
          <a href="#" class="forgot-password">{{ 'LOGIN.FORGOT_PASSWORD' | translate }}</a>
        </div>

        <button type="submit" class="btn-login flex justify-content-center align-items-center gap-1">
          {{ 'LOGIN.LOG_IN' | translate }}
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>

        <p class="signup-prompt">
          {{ 'LOGIN.SIGN_UP_PROMPT' | translate }} <a href="#">{{ 'LOGIN.SIGN_UP' | translate }}</a>
        </p>

        <div class="divider">
          <span>{{ 'LOGIN.OR_CONTINUE' | translate }}</span>
        </div>

        <div class="social-login">
          <button type="button" class="social-btn google w-2">
            <svg viewBox="0 0 24 24">
              <path
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                fill="#4285F4" />
              <path
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                fill="#34A853" />
              <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                fill="#FBBC05" />
              <path
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                fill="#EA4335" />
            </svg>
          </button>
          <button type="button" class="social-btn w-2">
            <svg viewBox="0 0 24 24" fill="#1877F2">
              <path
                d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
            </svg>
          </button>
          <button type="button" class="social-btn w-2">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
            </svg>
          </button>
        </div>
      </form>
    </div>
  </section>
</div>
